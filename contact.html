<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — FlockBlock.Pro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap" style="max-width:700px;margin:40px auto">
    <h1>Contact</h1>
    <p class="muted">Questions, partnership inquiries, or refund requests — email or use the form below.</p>

    <p><strong>Email</strong><br/><a href="mailto:FlockBlock.dnsmi@gmail.com">FlockBlock.dnsmi@gmail.com</a></p>

    <form name="contact" method="POST" data-netlify="true" action="/thank-you.html">
      <input type="hidden" name="form-name" value="contact" />
      <p><label>Name<br/><input name="name" required /></label></p>
      <p><label>Email<br/><input name="email" type="email" required /></label></p>
      <p><label>Message<br/><textarea name="message" rows="6" required></textarea></label></p>
      <p><button class="btn primary" type="submit">Send message</button></p>
    </form>

    <footer class="footer" style="margin-top:18px">
      © 2026 Keegan Brooke Company. All rights reserved.
    </footer>
  </div>
</body>
</html>
